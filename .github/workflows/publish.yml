name: Publish and Release

# This workflow publishes the plugin to Maven Central and creates a GitHub release.
# It can be triggered manually from the GitHub Actions UI.
#
# The workflow performs the following steps:
# 1. Reads the current version from build.gradle.kts
# 2. Runs tests
# 3. In parallel:
#    a. Publishes to Maven Central
#    b. Creates a git tag and GitHub release with auto-generated release notes
#       Calculates the next version (increments patch)
#       Updates build.gradle.kts with the new version
#       Commits and pushes the version update back to main

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts | head -1)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version to publish: $CURRENT_VERSION"

  test:
    name: Run tests
    needs: [ get-version ]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew test --no-configuration-cache

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests/

  publish:
    name: Publish to Maven Central
    needs: [ test, get-version ]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  create-release-and-update-version:
    name: Create Release and Update Version
    needs: [ test, get-version ]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG_NAME="$VERSION"
          echo "Creating tag: $TAG_NAME"

          git tag -a "$TAG_NAME" -m "$TAG_NAME"
          git push origin "$TAG_NAME"

          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --generate-notes \
            --target main

      - name: Calculate next version
        id: next_version
        run: |
          CURRENT_VERSION="${{ needs.get-version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Update version in build.gradle.kts
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          CURRENT_VERSION="${{ needs.get-version.outputs.version }}"
          sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEXT_VERSION\"/" build.gradle.kts
          echo "Updated version to $NEXT_VERSION"
          grep 'version = ' build.gradle.kts

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          git add build.gradle.kts
          git commit -m "Bump version to $NEXT_VERSION"
          git push origin main
